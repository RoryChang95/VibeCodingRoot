<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
  min-height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: "Microsoft JhengHei", sans-serif;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

button {
  padding: 14px 28px;
  border: none;
  border-radius: 999px;
  background: #6c63ff;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

  </style>
  
</head>
<body>
  <div class="card">
  <h1>Vibe Check！今日運勢</h1>
  <p id="fortuneText">點擊下方按鈕查看今日 Vibe</p>
  <button id="fortuneBtn">查看今日運勢</button>
</div>
</body>

<script>
const fortuneText = document.getElementById("fortuneText");
const fortuneBtn = document.getElementById("fortuneBtn");
const fortunes = [
  "程式碼一發就過",
  "發現神級 Bug，但也順利修掉",
  "咖啡差點打翻在鍵盤上",
  "今日大吉，適合寫 Code",
  "突然看懂複雜語法"
];

fortuneBtn.addEventListener("click", function () {
  const randomIndex = Math.floor(Math.random() * fortunes.length);
  fortuneText.textContent = fortunes[randomIndex];
});
</script>

</html>
